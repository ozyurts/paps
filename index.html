<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pegasus Peer Support</title>
    <script>
      (() => {
        const saved = localStorage.getItem('lang');
        const lang = saved === 'tr-TR' || saved === 'en-US' ? saved : 'tr-TR';
        window.location.replace(`/${lang}/`);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting… <a href="/tr-TR/">TR</a> | <a href="/en-US/">EN</a></p>
  </body>
</html>
